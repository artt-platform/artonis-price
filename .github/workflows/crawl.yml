name: Crawl auctions

# Triggers:
#   - Daily 02:00 UTC (= 09:00 ICT): fast sources only (no Playwright)
#   - Weekly Sunday 19:00 UTC (= 02:00 Mon ICT): full crawl + refresh stats
#   - Manual: pick sources via dropdown

# Serialise every scheduled run + manual dispatch behind a single
# concurrency lock.  Operator 2026-06-27 audit flagged the 4-hourly
# Drouot refetch firing at 04:00 UTC while the daily 02:00 crawl was
# still running — both write to the same SQLite file and push the
# same source_urls to PostgREST, so the later writer's empty values
# could revert the earlier writer's fills.  cancel-in-progress=false
# means the second run waits instead of killing the first.
concurrency:
  group: crawl-and-sync
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 2 * * *'    # daily 09:00 ICT — full crawl all sources
    - cron: '0 19 * * 0'   # Sunday 02:00 Mon ICT — weekly Playwright + refresh
    # 4-hourly Drouot refetch (option C, SPEC §14.4).  Catches hammer
    # prices within the 12-48h window Drouot serves them.  Lightweight:
    # only refetches watchlist URLs with sale_date in last 24h.
    - cron: '0 */4 * * *'  # 00, 04, 08, 12, 16, 20 UTC daily
  workflow_dispatch:
    inputs:
      crawlers:
        description: 'Comma-separated crawler keys (empty = all)'
        required: false
        default: ''
      max_pages:
        description: 'Max pages per crawler'
        required: false
        default: '100'
      refresh_stats:
        description: 'Refresh artist stats after crawl'
        type: boolean
        default: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python deps
        run: |
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          # Only install browser for weekly runs (includes invaluable/aguttes/global_auction)
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 19 * * 0" ]; then
            playwright install --with-deps chromium
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            playwright install --with-deps chromium
          fi

      - name: Configure env
        run: |
          # Sentinel env file for crawl_and_sync.py to read
          cat > .env.local <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF

      - name: Init empty SQLite
        run: |
          # Create empty data/ with fresh DB — crawler will populate
          mkdir -p data
          /usr/bin/python3 -c "
          import sys; sys.path.insert(0, '.')
          from artonis_price_mvp import init_db
          init_db()
          "

      - name: Pick crawlers list
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual: use user input, all if empty
            CRAWLERS_LIST="${{ github.event.inputs.crawlers }}"
            MAX_PAGES="${{ github.event.inputs.max_pages }}"
          elif [ "${{ github.event.schedule }}" = "0 */4 * * *" ]; then
            # 4-hourly: Drouot refetch only (option C, SPEC §14.4).
            # Most runs find no due URLs and exit in seconds.
            CRAWLERS_LIST="drouot_refetch"
            MAX_PAGES="50"
          elif [ "${{ github.event.schedule }}" = "0 2 * * *" ]; then
            # Daily: fast sources only (no Playwright)
            CRAWLERS_LIST="christies,sothebys,phillips,bonhams,millon,millon_vn,tajan,artcurial,larasati,ravenel,osenat,gros_delettrez,dawsons,drouot,everard,austin_auction"
            MAX_PAGES="50"
          else
            # Weekly: all
            CRAWLERS_LIST=""
            MAX_PAGES="100"
          fi
          echo "crawlers=$CRAWLERS_LIST" >> $GITHUB_OUTPUT
          echo "max_pages=$MAX_PAGES" >> $GITHUB_OUTPUT
          echo "Crawlers: '$CRAWLERS_LIST', max_pages: $MAX_PAGES"

      - name: Run crawl + sync
        env:
          CRAWLERS: ${{ steps.pick.outputs.crawlers }}
          MAX_PAGES: ${{ steps.pick.outputs.max_pages }}
        run: |
          python3 crawl_and_sync.py

      - name: Refresh artist stats
        if: github.event_name == 'schedule' && github.event.schedule == '0 19 * * 0' || github.event.inputs.refresh_stats == 'true'
        run: |
          python3 supabase/refresh_artist_stats.py

      - name: Fetch upcoming auctions
        if: always()
        continue-on-error: true
        run: |
          python3 supabase/fetch_upcoming.py

      - name: Fix dim orientation (W/H by image aspect)
        if: always()
        continue-on-error: true
        run: |
          python3 supabase/fix_dim_orientation.py

      - name: Pull Drouot hammers (past estimate_only → sold)
        if: always()
        continue-on-error: true
        run: |
          python3 supabase/pull_drouot_hammers.py

      - name: Backfill Invaluable images (CF-friendly, fresh runner IP)
        if: always()
        continue-on-error: true
        run: |
          python3 supabase/backfill_invaluable_images.py

      - name: Pull Invaluable hammers (past estimate_only → sold)
        if: always()
        continue-on-error: true
        run: |
          python3 supabase/pull_invaluable_hammers.py

      - name: Backfill image pHash (for dedup)
        if: always()
        continue-on-error: true
        run: |
          python3 supabase/backfill_image_phash.py

      - name: Summary
        if: always()
        run: |
          echo "## Crawl finished" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }} ${{ github.event.schedule }}" >> $GITHUB_STEP_SUMMARY
          echo "- Crawlers: ${{ steps.pick.outputs.crawlers || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Max pages: ${{ steps.pick.outputs.max_pages }}" >> $GITHUB_STEP_SUMMARY

      - name: Heartbeat to Supabase
        if: always()
        continue-on-error: true
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STATUS="${{ job.status }}"
          NOTE="run=${{ github.run_id }} trigger=${{ github.event_name }} schedule=${{ github.event.schedule }}"
          curl -s -X POST "$SB_URL/rest/v1/crawl_runs" \
            -H "apikey: $SB_KEY" \
            -H "Authorization: Bearer $SB_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"source\":\"_workflow_\",\"status\":\"$STATUS\",\"note\":\"$NOTE\",\"finished_at\":\"$(date -u +%FT%TZ)\"}" \
            || echo "heartbeat ping failed"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Crawl failed (run ${context.runId})`,
              body: `Daily crawl workflow failed.\n\n**Run:** ${runUrl}\n**Trigger:** ${context.eventName} ${context.payload.schedule || ''}\n**Time:** ${new Date().toISOString()}\n\nCheck the run logs and the [admin monitor page](https://index.artonis.io/admin/cron).`,
              labels: ['crawler-failure']
            });
